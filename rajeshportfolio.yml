---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rajeshdeployment
  labels:
    app: raj
spec:
  replicas: 5
  selector:
    matchLabels:
      app: raj
  template:
    metadata:
      labels:
        app: raj
    spec:
      containers:
      - name: rajeshcont1
        image: rajeshtutta/rajeshportfolio:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    app: raj
  ports:
    - protocol: TCP
      port: 8080        # Service port
      targetPort: 8080 # Pod container port
      nodePort: 30251
  type: NodePort     # Default service typei
